<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Geoportal · WebGIS Riviera de São Lourenço</title>
<meta name="description" content="Geoportal interativo da Riviera de São Lourenço com camadas ambientais, mobilidade, hidrografia e análises de temperatura superficial.">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<!-- leaflet-rotate CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate.css" />

<!-- Tipografia -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="map"></div>

<!-- ===== HUD inferior (leitura de coordenadas / escala) ===== -->
<div id="hud" class="glass-panel">
  <div class="hud-item">
    <span class="hud-label">LAT</span>
    <span class="hud-value" id="hud-lat">—</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-item">
    <span class="hud-label">LON</span>
    <span class="hud-value" id="hud-lon">—</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-item">
    <span class="hud-label">ZOOM</span>
    <span class="hud-value" id="hud-zoom">—</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-item" id="hud-scale-wrap">
    <span class="hud-label">ESCALA</span>
    <span class="hud-value" id="hud-scale">—</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-item">
    <span class="hud-label">ROTAÇÃO</span>
    <span class="hud-value" id="hud-bearing">15.0°</span>
  </div>
</div>

<!-- ===== Toolbar flutuante (canto superior direito) ===== -->
<div id="toolbar" class="glass-panel">
  <button class="tool-btn" id="btn-zoom-in" title="Aumentar zoom" aria-label="Aumentar zoom">+</button>
  <button class="tool-btn" id="btn-zoom-out" title="Diminuir zoom" aria-label="Diminuir zoom">−</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btn-locate" title="Minha localização" aria-label="Minha localização">◎</button>
  <button class="tool-btn" id="btn-reset" title="Vista inicial" aria-label="Vista inicial">⤢</button>
</div>

<!-- ===== Bússola / Reset Rotação (canto superior direito, abaixo da toolbar) ===== -->
<div id="compass-control" class="glass-panel" title="Resetar rotação para o Norte">
  <button id="btn-north" aria-label="Resetar para o Norte">
    <svg id="compass-svg" viewBox="0 0 40 40" width="40" height="40">
      <!-- Rosa dos ventos -->
      <circle cx="20" cy="20" r="18" fill="rgba(11,18,32,0.5)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <!-- Agulha Norte (vermelho) -->
      <polygon id="needle-north" points="20,5 17,20 20,18 23,20" fill="#F0596A"/>
      <!-- Agulha Sul (branco) -->
      <polygon id="needle-south" points="20,35 17,20 20,22 23,20" fill="rgba(255,255,255,0.5)"/>
      <!-- Letra N -->
      <text x="20" y="14" text-anchor="middle" font-size="5" font-family="Inter,sans-serif" font-weight="700" fill="#F0596A" id="compass-n">N</text>
    </svg>
  </button>
</div>

<!-- ===== Botão para reabrir o menu quando colapsado ===== -->
<button id="sidebar-reopen" class="glass-panel" aria-label="Abrir menu">
  <span class="reopen-icon">☰</span>
</button>

<!-- ===== Sidebar / Menu lateral flutuante ===== -->
<aside id="sidebar" class="glass-panel">

  <header class="sidebar-header">
    <div class="brand">
      <span class="brand-mark">◈</span>
      <div class="brand-text">
        <h1>Geoportal</h1>
        <span class="brand-sub">Riviera de São Lourenço</span>
      </div>
    </div>
    <button id="sidebar-collapse" aria-label="Recolher menu" title="Recolher menu">‹</button>
  </header>

  <div class="sidebar-body">

    <!-- Mapas de fundo -->
    <section class="panel-section">
      <h2 class="section-title"><span class="section-index">01</span> Mapa Base</h2>
      <div class="basemap-grid">
        <button class="basemap-btn active" data-base="osm">
          <span class="basemap-swatch swatch-osm"></span>
          <span>OpenStreetMap</span>
        </button>
        <button class="basemap-btn" data-base="satellite">
          <span class="basemap-swatch swatch-sat"></span>
          <span>Satélite</span>
        </button>
        <button class="basemap-btn" data-base="topo">
          <span class="basemap-swatch swatch-topo"></span>
          <span>Relevo / Topo</span>
        </button>
      </div>
    </section>

    <!-- Camadas -->
    <section class="panel-section">
      <h2 class="section-title"><span class="section-index">02</span> Camadas</h2>
      <div id="layers-tree" class="layers-tree">
        <p class="layers-empty">Carregando camadas…</p>
      </div>
    </section>

    <!-- Upload -->
    <section class="panel-section">
      <h2 class="section-title"><span class="section-index">03</span> Adicionar Dados</h2>

      <label id="dropzone" for="file-input">
        <span class="dropzone-icon">⇪</span>
        <span class="dropzone-text">Arraste um arquivo <strong>.geojson</strong> aqui<br>ou clique para selecionar</span>
      </label>
      <input type="file" id="file-input" accept=".geojson,.json,application/geo+json,application/json" multiple hidden />

      <button id="btn-open-folder" class="secondary-btn">
        Abrir pasta local (.geojson)
      </button>
      <p class="hint-text" id="folder-hint">Seleciona uma pasta e carrega todos os arquivos .geojson. Requer Chrome ou Edge.</p>
    </section>

  </div>

  <footer class="sidebar-footer">
    <span id="layer-count">0 camadas carregadas</span>
  </footer>

</aside>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- leaflet-rotate JS -->
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
<!-- leaflet-imageoverlay-rotated JS -->
<script src="https://unpkg.com/leaflet-imageoverlay-rotated@latest/Leaflet.ImageOverlay.Rotated.js"></script>
<!-- App JS -->
<script src="script.js"></script>
</body>
</html>
